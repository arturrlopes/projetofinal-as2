<h1>Publicação de @{{ post.autor.username }}</h1>
<p>{{ post.conteudo }}</p>
<p>Data: {{ post.data_criacao }}</p>
<form method="POST">
    {% csrf_token %}
    <button type="submit">❤️ Dar Gosto (Atual: {{ post.gostos }})</button>
</form>
<br>
<a href="{% url 'pagina_inicial' %}">⬅️ Voltar ao Feed</a>
